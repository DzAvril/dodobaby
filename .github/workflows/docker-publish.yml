name: Docker Publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Validate Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests and lint
        run: |
          npm test
          npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: dodobaby:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Chromium runtime
        run: |
          docker run --rm \
            --security-opt no-new-privileges:true \
            --entrypoint sh \
            dodobaby:ci \
            -c 'test -d "$HOME" && test -w "$HOME" && chromium --headless --no-sandbox --disable-dev-shm-usage --dump-dom "data:text/html,<p>PDF smoke</p>" 2>/tmp/chromium-smoke.err | grep -q "PDF smoke"'

      - name: Validate application runtime
        shell: bash
        run: |
          set -euo pipefail
          container=dodobaby-runtime-smoke
          session_secret=runtime-smoke-session-secret-1234567890
          cleanup() { docker rm -f "$container" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker run -d \
            --name "$container" \
            --security-opt no-new-privileges:true \
            --tmpfs /tmp:size=512m,mode=1777 \
            --shm-size=256m \
            -p 127.0.0.1:13000:3000 \
            -e APP_URL=http://127.0.0.1:13000 \
            -e DODOBABY_SESSION_SECRET="$session_secret" \
            dodobaby:ci
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:13000/api/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs "$container"
              exit 1
            fi
            sleep 1
          done
          SMOKE_SESSION_SECRET="$session_secret" node scripts/runtime-smoke.mjs http://127.0.0.1:13000
          chrome_path=$(command -v google-chrome || command -v chromium || true)
          if [ -z "$chrome_path" ]; then
            echo "No Chromium-compatible browser found on the runner."
            exit 1
          fi
          SMOKE_SESSION_SECRET="$session_secret" CHROMIUM_PATH="$chrome_path" node scripts/browser-smoke.mjs http://127.0.0.1:13000

  publish:
    name: Publish Docker Hub image
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: BuildImage
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check publication credentials
        shell: bash
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Docker Hub credentials are not configured."
            exit 1
          fi
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::Telegram credentials are not configured."
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/dodobaby
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Telegram
        if: success()
        shell: bash
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials are not configured."
            exit 1
          fi

          telegram_bot_token="$(printf '%s' "$TELEGRAM_BOT_TOKEN" | tr -d '[:space:]')"
          telegram_chat_id="$(printf '%s' "$TELEGRAM_CHAT_ID" | tr -d '[:space:]')"

          printf -v message '✅ dodobaby 镜像发布成功\n仓库: %s\n提交: %.7s\n镜像: %s/dodobaby:latest\nAction: %s/%s/actions/runs/%s' \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_SHA" \
            "$DOCKERHUB_USERNAME" \
            "$GITHUB_SERVER_URL" \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_RUN_ID"

          curl --fail-with-body --silent --show-error \
            --output /dev/null \
            --request POST \
            --url "https://api.telegram.org/bot${telegram_bot_token}/sendMessage" \
            --data-urlencode "chat_id=${telegram_chat_id}" \
            --data-urlencode "text=${message}"
