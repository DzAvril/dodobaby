<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fbf7ef" />
    <title>暂时无法连接 · 宝宝辅食日记</title>
    <style>
      :root { color-scheme: light; font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: #fbf7ef; color: #3f382f; }
      main { width: min(100%, 420px); padding: 42px 30px; border: 1px solid #e9dfd0; border-radius: 28px; background: #fffdf9; text-align: center; box-shadow: 0 18px 60px rgba(92, 71, 45, .1); }
      .mark { width: 72px; height: 72px; margin: 0 auto 22px; filter: drop-shadow(0 7px 14px rgba(92, 71, 45, .12)); }
      h1 { margin: 0; font-family: "Songti SC", serif; font-size: 30px; }
      p { margin: 14px 0 26px; color: #7c7165; line-height: 1.7; }
      button { min-height: 44px; border: 0; border-radius: 12px; padding: 0 20px; background: #3f382f; color: white; font: inherit; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <img class="mark" src="/brand-mark.svg" alt="" />
      <h1>暂时无法连接</h1>
      <p>请检查网络或服务器状态。恢复连接后，重新打开宝宝辅食日记即可。</p>
      <button type="button" onclick="location.reload()">重新尝试</button>
    </main>
  </body>
</html>
