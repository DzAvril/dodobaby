services:
  app:
    build:
      context: .
    image: dodobaby-food-diary:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/dodobaby.db
      CHROMIUM_PATH: /usr/bin/chromium
      TZ: Asia/Shanghai
    ports:
      - "${APP_HOST:-127.0.0.1}:${APP_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    tmpfs:
      - /tmp:size=512m,mode=1777
    shm_size: 256mb
    security_opt:
      - no-new-privileges:true
